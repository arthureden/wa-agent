version: "3.9"

services:
  wa-agent:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_ACCESS_TOKEN=${WA_ACCESS_TOKEN}
      - WA_VERIFY_TOKEN=${WA_VERIFY_TOKEN:-meu_verify_token_secreto}
      - PORT=8080
    restart: unless-stopped
